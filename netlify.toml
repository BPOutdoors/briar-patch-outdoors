[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* vars are intentionally embedded in the client bundle.
  # STORE_ALERT_EMAIL is a public-facing store email in the footer/contact page.
  # KINSEYS_API_BASE_URL is a hardcoded fallback in lib/kinseys.ts (not a secret).
  # KINSEYS_DEALER_ACCOUNT and SYNC_SECRET_KEY appear in the admin integrations page
  # which is behind authentication — no public exposure risk.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,STORE_ALERT_EMAIL,KINSEYS_API_BASE_URL,KINSEYS_DEALER_ACCOUNT,SYNC_SECRET_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
